<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NML Collective</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; background: #05080f; color: #c9d1d9; min-height: 100vh; overflow: hidden; }
.header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; background: rgba(5,8,15,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(88,166,255,0.15); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; color: #58a6ff; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
.header .status { font-size: 12px; color: #8b949e; }
.header .status .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #3fb950; margin-right: 5px; box-shadow: 0 0 8px #3fb950; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 8px #3fb950; } 50% { opacity: 0.4; box-shadow: 0 0 2px #3fb950; } }
canvas#nebula { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
.sidebar { position: fixed; top: 48px; right: 0; width: 340px; height: calc(100vh - 48px); z-index: 5; background: rgba(10,14,23,0.88); backdrop-filter: blur(12px); border-left: 1px solid rgba(88,166,255,0.12); overflow-y: auto; padding: 16px; }
.sidebar h2 { font-size: 11px; color: #58a6ff; text-transform: uppercase; letter-spacing: 2px; margin: 16px 0 8px; }
.sidebar h2:first-child { margin-top: 0; }
.agent-card { background: rgba(13,17,23,0.7); border: 1px solid rgba(48,54,61,0.6); border-radius: 6px; padding: 10px; margin-bottom: 6px; }
.agent-card .name { font-size: 13px; font-weight: 600; color: #f0f6fc; }
.agent-card .meta { font-size: 10px; color: #6e7681; margin-top: 3px; }
.agent-card .score { font-size: 15px; font-weight: 700; margin-top: 4px; }
.agent-card .score.high { color: #f85149; }
.agent-card .score.low { color: #3fb950; }
.event-item { font-size: 10px; padding: 4px 0; border-bottom: 1px solid rgba(33,38,45,0.5); display: flex; gap: 6px; }
.event-item .time { color: #484f58; min-width: 48px; }
.event-item .type { font-weight: 600; min-width: 100px; }
.event-item .type.program_received { color: #d2a8ff; }
.event-item .type.program_executed { color: #3fb950; }
.event-item .type.peer_discovered, .event-item .type.udp_peer, .event-item .type.mdns_discovered { color: #58a6ff; }
.event-item .type.peer_lost, .event-item .type.mdns_stale { color: #f85149; }
.event-item .type.udp_broadcast, .event-item .type.udp_program { color: #d29922; }
.event-item .detail { color: #6e7681; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.consensus-bar { background: rgba(13,17,23,0.7); border: 1px solid rgba(210,168,255,0.3); border-radius: 6px; padding: 10px; margin-top: 8px; }
.consensus-bar .label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
.consensus-bar .value { font-size: 22px; font-weight: 700; color: #d2a8ff; margin-top: 2px; }
.consensus-bar .strategy { font-size: 10px; color: #484f58; }
.nebula-stat { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; color: #8b949e; }
.nebula-stat .val { color: #d2a8ff; font-weight: 600; }
.quarantine-item { background: rgba(210,168,255,0.08); border: 1px solid rgba(210,168,255,0.2); border-radius: 4px; padding: 6px 8px; margin-top: 4px; font-size: 10px; }
.quarantine-item .q-name { color: #d2a8ff; font-weight: 600; }
.quarantine-item .q-meta { color: #6e7681; }
.quarantine-item .q-approve { background: #238636; border: none; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 9px; cursor: pointer; margin-left: 4px; }
.quarantine-item .q-reject { background: #da3633; border: none; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 9px; cursor: pointer; margin-left: 4px; }
.role-badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
.role-badge.sentient { background: rgba(210,168,255,0.2); color: #d2a8ff; }
.role-badge.worker { background: rgba(63,185,80,0.2); color: #3fb950; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 340px; z-index: 5; background: rgba(5,8,15,0.85); backdrop-filter: blur(12px); border-top: 1px solid rgba(88,166,255,0.12); padding: 10px 24px; display: flex; gap: 8px; }
.bottom-bar input { flex: 1; background: rgba(13,17,23,0.8); border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-family: inherit; font-size: 12px; }
.bottom-bar input:focus { outline: none; border-color: #58a6ff; }
.bottom-bar button { background: #238636; border: none; border-radius: 6px; padding: 8px 16px; color: #fff; font-family: inherit; font-size: 11px; cursor: pointer; font-weight: 600; }
.bottom-bar button:hover { background: #2ea043; }
.bottom-bar button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1>NML Collective</h1>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Awaiting connection...</span></div>
</div>

<canvas id="nebula"></canvas>

<div class="sidebar">
  <h2>Agents</h2>
  <div id="agentCards"><div style="color:#484f58;font-size:11px;padding:20px 0;text-align:center">No agents discovered</div></div>
  <div class="consensus-bar" id="consensusBar" style="display:none">
    <div class="label">Vote Consensus</div>
    <div class="value" id="consensusValue">-</div>
    <div class="strategy" id="consensusStrategy"></div>
  </div>
  <h2>Nebula</h2>
  <div id="nebulaStats"><div style="color:#484f58;font-size:11px;padding:10px 0;text-align:center">No sentient connected</div></div>
  <div id="quarantineList"></div>
  <h2>Event Feed</h2>
  <div id="eventFeed"><div style="color:#484f58;font-size:11px;padding:20px 0;text-align:center">Waiting for events...</div></div>
</div>

<div class="bottom-bar">
  <input type="text" id="seedInput" placeholder="Agent URL (e.g. http://localhost:9001)" />
  <button id="connectBtn" onclick="connectToAgent()">Connect</button>
  <button id="submitBtn" onclick="submitProgram()" disabled>Broadcast</button>
  <button id="consensusBtn" onclick="requestConsensus()" disabled>VOTE</button>
</div>

<script>
const agents = {};
let allEvents = [];
let knownSeed = null;
const wsConnections = {};

/* ═══════════════════════════════════════════
   NEBULA + ORBIT RENDERER
   ═══════════════════════════════════════════ */
const canvas = document.getElementById('nebula');
const ctx = canvas.getContext('2d');
let W, H, frame = 0;
const particles = [];
const dataStreams = [];

function resize() {
  W = canvas.width = window.innerWidth * 2;
  H = canvas.height = window.innerHeight * 2;
  ctx.scale(1, 1);
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    const a = Math.random() * Math.PI * 2;
    const r = 20 + Math.random() * 60;
    this.x = W/2 + Math.cos(a) * r;
    this.y = H/2 + Math.sin(a) * r;
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.8;
    this.life = 0.5 + Math.random() * 1.5;
    this.maxLife = this.life;
    this.size = 1 + Math.random() * 2.5;
    this.hue = 210 + Math.random() * 60;
  }
  update(dt) {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= dt;
    if (this.life <= 0) this.reset();
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife) * 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

class DataStream {
  constructor(fromX, fromY, toX, toY) {
    this.fromX = fromX; this.fromY = fromY;
    this.toX = toX; this.toY = toY;
    this.progress = 0;
    this.speed = 0.008 + Math.random() * 0.012;
    this.hue = 180 + Math.random() * 80;
  }
  update() {
    this.progress += this.speed;
    return this.progress < 1;
  }
  draw(ctx) {
    const t = this.progress;
    const x = this.fromX + (this.toX - this.fromX) * t;
    const y = this.fromY + (this.toY - this.fromY) * t;
    const alpha = Math.sin(t * Math.PI) * 0.9;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 90%, 75%, ${alpha})`;
    ctx.shadowColor = `hsla(${this.hue}, 90%, 60%, ${alpha})`;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawNebula(time) {
  const cx = W / 2, cy = H / 2;

  const active = window._nebulaActive || false;
  const intensity = active ? 1.5 : 1.0;
  const coreHue = active ? 280 : 230;

  /* Nebula glow layers */
  const breathe = 0.85 + 0.15 * Math.sin(time * 0.001);
  for (let layer = 3; layer >= 0; layer--) {
    const r = (50 + layer * 30) * breathe * intensity;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    const hue = coreHue + layer * 15;
    const sat = 70 + layer * 5;
    const alpha = (0.25 - layer * 0.05) * intensity;
    grad.addColorStop(0, `hsla(${hue}, ${sat}%, 50%, ${alpha})`);
    grad.addColorStop(0.5, `hsla(${hue + 20}, ${sat}%, 40%, ${alpha * 0.4})`);
    grad.addColorStop(1, `hsla(${hue}, ${sat}%, 30%, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  }

  /* Core bright point — pulses purple when quarantine has items */
  const coreR = active ? 18 : 12;
  const corePulse = active ? 0.8 + 0.2 * Math.sin(time * 0.006) : 0.7 + 0.2 * Math.sin(time * 0.003);
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  coreGrad.addColorStop(0, `hsla(${coreHue}, 100%, 90%, ${corePulse})`);
  coreGrad.addColorStop(1, `hsla(${coreHue}, 100%, 60%, 0)`);
  ctx.fillStyle = coreGrad;
  ctx.fillRect(cx - coreR, cy - coreR, coreR * 2, coreR * 2);

  /* Label */
  ctx.fillStyle = `rgba(${active ? '210, 168, 255' : '136, 192, 255'}, ${0.4 + 0.1 * Math.sin(time * 0.002)})`;
  ctx.font = '18px SF Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(active ? 'NEBULA' : 'NML', cx / 2, cy / 2 + 80);
}

function drawOrbitingAgents(time) {
  const agentList = Object.values(agents);
  if (agentList.length === 0) return;

  const cx = W / 2, cy = H / 2;
  const orbitRadius = Math.min(cx, cy) * 0.35;

  /* Orbit ring */
  ctx.beginPath();
  ctx.arc(cx, cy, orbitRadius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(88, 166, 255, 0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  agentList.forEach((a, i) => {
    const baseAngle = (2 * Math.PI * i) / agentList.length;
    const orbitSpeed = 0.0003 + i * 0.00005;
    const angle = baseAngle + time * orbitSpeed;
    const wobble = Math.sin(time * 0.002 + i * 1.5) * 8;

    const x = cx + (orbitRadius + wobble) * Math.cos(angle);
    const y = cy + (orbitRadius + wobble) * Math.sin(angle);

    a._drawX = x;
    a._drawY = y;

    /* Connection lines between peers */
    for (const p of (a.peers || [])) {
      const peer = agents[p.name];
      if (peer && peer._drawX != null) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(peer._drawX, peer._drawY);
        ctx.strokeStyle = 'rgba(88, 166, 255, 0.07)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    /* Agent glow — sentients are purple, workers are blue/green */
    const hasPrograms = a.programs_received > 0;
    const isSentient = a.role === 'sentient';
    const glowHue = isSentient ? 280 : (hasPrograms ? 140 : 220);
    const glowR = 28 + 4 * Math.sin(time * 0.004 + i);
    const glow = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    glow.addColorStop(0, `hsla(${glowHue}, 80%, 60%, 0.4)`);
    glow.addColorStop(1, `hsla(${glowHue}, 80%, 40%, 0)`);
    ctx.fillStyle = glow;
    ctx.fillRect(x - glowR, y - glowR, glowR * 2, glowR * 2);

    /* Agent dot */
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = isSentient ? '#d2a8ff' : (hasPrograms ? '#3fb950' : '#58a6ff');
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* Name label */
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '16px SF Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(a.name, x, y + 28);

    /* Score */
    if (a.last_result?.score != null) {
      ctx.fillStyle = a.last_result.score >= 0.5 ? '#f85149' : '#3fb950';
      ctx.font = 'bold 14px SF Mono, monospace';
      ctx.fillText(a.last_result.score.toFixed(3), x, y + 44);
    }

    /* Spawn data streams to nebula occasionally */
    if (hasPrograms && Math.random() < 0.008) {
      dataStreams.push(new DataStream(x, y, cx, cy));
    }
    if (hasPrograms && Math.random() < 0.005) {
      dataStreams.push(new DataStream(cx, cy, x, y));
    }
  });
}

function render(time) {
  ctx.clearRect(0, 0, W, H);

  /* Deep space background */
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
  bgGrad.addColorStop(0, '#0a0e1a');
  bgGrad.addColorStop(1, '#05080f');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  /* Distant stars */
  if (frame === 0) {
    window._stars = [];
    for (let i = 0; i < 200; i++) {
      window._stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.3 + Math.random() * 1.2,
        b: 0.2 + Math.random() * 0.5,
        s: 0.5 + Math.random() * 2,
      });
    }
  }
  for (const star of (window._stars || [])) {
    const twinkle = star.b + 0.15 * Math.sin(time * 0.001 * star.s + star.x);
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${twinkle})`;
    ctx.fill();
  }

  /* Nebula core */
  drawNebula(time);

  /* Particles */
  const dt = 0.016;
  for (const p of particles) { p.update(dt); p.draw(ctx); }

  /* Data streams */
  for (let i = dataStreams.length - 1; i >= 0; i--) {
    if (!dataStreams[i].update()) { dataStreams.splice(i, 1); continue; }
    dataStreams[i].draw(ctx);
  }

  /* Orbiting agents */
  drawOrbitingAgents(time);

  frame++;
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ═══════════════════════════════════════════
   WEBSOCKET + DATA
   ═══════════════════════════════════════════ */
function connectToAgent() {
  const url = document.getElementById('seedInput').value.trim();
  if (!url) return;
  knownSeed = url;
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('connectBtn').textContent = 'Connected';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('consensusBtn').disabled = false;
  connectWS(url);
}

function connectWS(agentUrl) {
  const wsUrl = agentUrl.replace('http://', 'ws://').replace('https://', 'wss://') + '/ws';
  if (wsConnections[wsUrl]) return;
  const ws = new WebSocket(wsUrl);
  wsConnections[wsUrl] = ws;
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.state) {
        const state = data.state;
        agents[state.name] = { ...state, url: agentUrl, lastPoll: Date.now() };
        if (state.recent_events) {
          for (const ev of state.recent_events) {
            const key = state.name + ':' + ev.time + ':' + ev.type;
            if (!allEvents.find(x => x.key === key)) allEvents.push({ ...ev, agent: state.name, key });
          }
        }
        for (const p of state.peers || []) {
          if (p.url && !wsConnections[p.url.replace('http://','ws://') + '/ws']) connectWS(p.url);
        }
      }
      updateSidebar();
    } catch (err) {}
  };
  ws.onclose = () => { delete wsConnections[wsUrl]; setTimeout(() => { if (knownSeed) connectWS(agentUrl); }, 3000); };
  ws.onerror = () => {};
}

function updateSidebar() {
  const agentList = Object.values(agents);
  document.getElementById('statusText').textContent = agentList.length + ' agent' + (agentList.length !== 1 ? 's' : '') + ' in collective';

  let cards = '';
  for (const a of agentList) {
    const score = a.last_result?.score;
    const scoreClass = score != null ? (score >= 0.5 ? 'high' : 'low') : '';
    const scoreText = score != null ? score.toFixed(4) : '-';
    const roleBadge = a.role ? `<span class="role-badge ${a.role}">${a.role}</span>` : '';
    cards += `<div class="agent-card"><div class="name">${a.name}${roleBadge}</div><div class="meta">${a.peer_count} peers · ${a.programs_received} prog · ${Math.round(a.uptime_seconds)}s</div><div class="score ${scoreClass}">${scoreText}</div></div>`;
  }
  document.getElementById('agentCards').innerHTML = cards || '<div style="color:#484f58;font-size:11px;padding:20px 0;text-align:center">No agents</div>';

  /* Nebula stats from sentient agents */
  const sentient = agentList.find(a => a.nebula_stats);
  if (sentient && sentient.nebula_stats) {
    const ns = sentient.nebula_stats;
    window._nebulaActive = ns.quarantine_pending > 0;
    document.getElementById('nebulaStats').innerHTML = `
      <div class="nebula-stat"><span>Programs</span><span class="val">${ns.programs}</span></div>
      <div class="nebula-stat"><span>Data approved</span><span class="val">${ns.data_approved}</span></div>
      <div class="nebula-stat"><span>Data rejected</span><span class="val">${ns.data_rejected}</span></div>
      <div class="nebula-stat"><span>Quarantine pending</span><span class="val">${ns.quarantine_pending}</span></div>
      <div class="nebula-stat"><span>Executions</span><span class="val">${ns.executions}</span></div>
      <div class="nebula-stat"><span>Ledger entries</span><span class="val">${ns.ledger_entries}</span></div>
    `;
  } else {
    window._nebulaActive = false;
  }

  allEvents.sort((a, b) => b.time - a.time);
  let feed = '';
  for (const e of allEvents.slice(0, 40)) {
    feed += `<div class="event-item"><span class="time">${e.time.toFixed(1)}s</span><span class="type ${e.type}">${e.type}</span><span class="detail">[${e.agent}] ${e.detail}</span></div>`;
  }
  document.getElementById('eventFeed').innerHTML = feed || '<div style="color:#484f58;font-size:11px;padding:20px 0;text-align:center">No events</div>';
}

async function submitProgram() {
  if (!knownSeed) return;
  const program = `LD    R1 @w1\nLD    R2 @b1\nLD    R3 @w2\nLD    R4 @b2\nLD    R0 @training_data\nLD    R9 @training_labels\nTNET  #1000  #0.01  #0\nST    R8 @training_loss\nLD    R0 @new_transaction\nMMUL  R5 R0 R1\nMADD  R5 R5 R2\nRELU  R5 R5\nMMUL  R6 R5 R3\nMADD  R6 R6 R4\nSIGM  RA R6\nST    RA @fraud_score\nCMPI  RE RA #0.5\nJMPF  #2\nLEAF  RB #0.0\nJUMP  #1\nLEAF  RB #1.0\nST    RB @decision\nHALT`;
  try { await fetch(knownSeed + '/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ program }) }); } catch (e) {}
}

async function requestConsensus() {
  if (!knownSeed) return;
  try {
    const resp = await fetch(knownSeed + '/consensus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ strategy: 'median' }) });
    const data = await resp.json();
    if (data.consensus != null) {
      document.getElementById('consensusBar').style.display = 'block';
      document.getElementById('consensusValue').textContent = data.consensus.toFixed(4);
      document.getElementById('consensusStrategy').textContent = `${data.strategy} · ${data.count} agents`;
    }
  } catch (e) {}
}
</script>
</body>
</html>
